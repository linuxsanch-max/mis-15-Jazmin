<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Vertical Video</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            color: white;
        }
        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: fade 30s infinite;
        }
        @keyframes fade {
            0% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; }
            45% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 1; }
        }
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        .nav-buttons button {
            background-color: turquoise;
            color: gold;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video class="video" autoplay muted loop>
            <source src="scene1.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 30s;">
            <source src="scene2.mp4" type="video/mp4">
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 60s;">
            <source src="scene3.mp4" type="video/mp4">
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 90s;">
            <source src="scene4.mp4" type="video/mp4">
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 120s;">
            <source src="scene5.mp4" type="video/mp4">
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 150s;">
            <source src="scene6.mp4" type="video/mp4">
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 180s;">
            <source src="scene7.mp4" type="video/mp4">
        </video>
        <video class="video" autoplay muted loop style="animation-delay: 210s;">
            <source src="scene8.mp4" type="video/mp4">
        </video>
        <div class="nav-buttons">
            <button onclick="prevScene()">Previous</button>
            <button onclick="nextScene()">Next</button>
        </div>
    </div>
    <script>
        let currentScene = 0;
        const videos = document.querySelectorAll('.video');
        function nextScene() {
            videos[currentScene].style.opacity = '0';
            currentScene = (currentScene + 1) % videos.length;
            videos[currentScene].style.opacity = '1';
        }
        function prevScene() {
            videos[currentScene].style.opacity = '0';
            currentScene = (currentScene - 1 + videos.length) % videos.length;
            videos[currentScene].style.opacity = '1';
        }
    </script>
</body>
</html>
