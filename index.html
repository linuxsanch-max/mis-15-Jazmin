<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis 15 Años - Jazmin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Great+Vibes&family=Prata&display=swap" rel="stylesheet">
    <style>
        :root {
            --turquesa-real: #003F3F;
            --turquesa-luz: #00B4A8;
            --oro-puro: #E8C56E;
            --fondo-noche: #010606;
            --papel: #FFF8E8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            height: 100vh;
            background: var(--fondo-noche);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Prata', serif;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(0,180,168,0.12) 1px, transparent 0),
                        radial-gradient(circle at 70% 80%, rgba(232,197,110,0.12) 1px, transparent 0);
            background-size: 80px 80px;
            opacity: 0.9;
            z-index: 1;
        }

        .envelope-wrapper {
            position: relative;
            width: min(92vw, 340px);
            height: 240px;
            perspective: 1800px;
            cursor: pointer;
            z-index: 10;
        }

        .envelope-front {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--turquesa-real);
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            border: 4px solid var(--oro-puro);
            box-shadow: 0 25px 50px rgba(0,0,0,0.85);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            z-index: 3;
        }

        .flap {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--turquesa-luz);
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            border-top: 4px solid var(--oro-puro);
            z-index: 4;
            clip-path: polygon(0 0, 100% 0, 50% 55%);
            transform-origin: top;
            transition: transform 1.1s cubic-bezier(0.6, 0, 0.3, 1);
        }

        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 68px;
            height: 68px;
            background: radial-gradient(circle, #f8e8b8, var(--oro-puro));
            border: 3px solid var(--oro-puro);
            border-radius: 50%;
            z-index: 5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel Decorative', cursive;
            color: #3d2a00;
            font-size: 1.7rem;
            box-shadow: 0 4px 15px rgba(232,197,110,0.6);
        }

        .card {
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            height: 200px;
            background: var(--papel);
            border: 3px solid var(--oro-puro);
            border-radius: 8px;
            padding: 25px 20px;
            text-align: center;
            overflow-y: auto;
            transition: all 1.1s cubic-bezier(0.6, 0, 0.3, 1);
            z-index: 2;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        .envelope-wrapper.open .flap { transform: rotateX(180deg); }
        .envelope-wrapper.open .seal { opacity: 0; }
        .envelope-wrapper.open .card {
            transform: translateY(-195px) scale(1.03);
            height: 520px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.85);
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--oro-puro);
            margin-bottom: 4px;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            font-size: 1.35rem;
            color: var(--turquesa-real);
            margin-bottom: 6px;
        }

        .name {
            font-family: 'Great Vibes', cursive;
            font-size: 2.85rem;
            color: var(--turquesa-real);
            margin: 8px 0 12px;
        }

        .main-text {
            font-size: 0.9rem;
            line-height: 1.55;
            color: #333;
            margin: 15px 0;
        }

        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--oro-puro), transparent);
            margin: 18px auto;
        }

        .info {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #222;
            margin-bottom: 18px;
        }

        .dress-code {
            font-size: 0.82rem;
            font-weight: bold;
            color: var(--oro-puro);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 22px;
        }

        .buttons {
            margin-top: auto;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--turquesa-real), var(--turquesa-luz));
            border: 2px solid var(--oro-puro);
            transition: all 0.3s;
        }

        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 20px rgba(232,197,110,0.4);
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="envelope-wrapper" onclick="this.classList.add('open')">
        
        <!-- Carta -->
        <div class="card">
            <div class="subtitle">UNA NOCHE DE ENSUEÑO</div>
            <h1>MIS 15 AÑOS</h1>
            <div class="name">Jazmin</div>

            <div class="main-text">
                "Hace 15 años iluminaste nuestras vidas, y hoy celebramos con orgullo la hermosa joven en la que te has convertido."
            </div>

            <div class="divider"></div>

            <div class="info">
                <strong>MARTES 18 DE AGOSTO - 21:00 HS</strong><br>
                Salón de Eventos Coopejas<br>
                J. Augusto Saldívar
            </div>

            <div class="dress-code">VESTIMENTA: SPORT ELEGANTE</div>

            <div class="buttons">
                <a href="https://wa.me/595982432818" class="btn">CONFIRMAR ASISTENCIA</a>
                <a href="https://maps.app.goo.gl/a9MzNJCMQNCpWhhXA" class="btn">VER UBICACIÓN</a>
            </div>
        </div>

        <!-- Sobre -->
        <div class="envelope-front"></div>
        <div class="flap">
            <div class="seal">J</div>
        </div>
    </div>

</body>
</html>
