<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Invitation</title>
    <style>
        body {
            background-image: url('linen_texture.jpg');
            font-family: 'Georgia', serif;
            color: #333;
        }
        .envelope {
            background-image: url('envelope_texture.jpg');
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }
        .seal {
            background-image: url('3d_wax_seal.jpg');
            width: 50px;
            height: 50px;
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .parchment {
            background-color: #f5f5dc;
            border: 2px solid #8b4513;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }
        .dress-code {
            font-weight: bold;
            color: #ff4500;
        }
        .buttons {
            background-color: #40e0d0;
            border: 1px solid #696969;
            border-radius: 5px;
            padding: 10px;
            color: white;
        }
        .magic {
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="envelope">
        <div class="seal"></div>
        <h1>You're Invited!</h1>
        <div class="parchment">
            <p>Dear Guest,</p>
            <p>We are pleased to invite you to a special event.</p>
            <p class="dress-code">Dress Code: Elegant Attire</p>
        </div>
        <div class="buttons">
            <p>RSVP</p>
            <p>Contact: info@example.com</p>
        </div>
        <div class="magic">✨</div>
    </div>
</body>
</html>
