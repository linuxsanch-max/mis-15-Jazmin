<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis 15 Años - Jazmin</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Prata&display=swap" rel="stylesheet">

<style>
:root {
    --turquesa-real: #004e4e;
    --turquesa-profundo: #003838;
    --turquesa-luz: #0aa3a3;
    --oro-puro: #d4af37;
    --oro-suave: #e6c766;
    --fondo-noche: #010606;
    --papel: #fffaf0;
}

body {
    margin: 0;
    background-color: var(--fondo-noche);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Prata', serif;
}

/* Fondo mágico */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(10,163,163,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212,175,55,0.15), transparent 40%),
                #010606;
    z-index: 1;
}

/* SOBRE */
.envelope-wrapper {
    position: relative;
    cursor: pointer;
    z-index: 10;
    width: 320px;
    height: 220px;
    perspective: 1500px;
}

.envelope-front {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--turquesa-real);
    background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
    border: 2px solid var(--oro-puro);
    z-index: 3;
    box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 50%, 100% 0);
}

.flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: var(--turquesa-luz);
    background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
    border-top: 2px solid var(--oro-puro);
    z-index: 4;
    clip-path: polygon(0 0, 100% 0, 50% 50%);
    transform-origin: top;
    transition: transform 0.7s ease;
}

.seal {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 55px;
    height: 55px;
    background: radial-gradient(circle, #f1d570, var(--oro-puro));
    border-radius: 50%;
    z-index: 5;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel Decorative', cursive;
    color: #5a4300;
    font-size: 1.3rem;
}

/* CARTA */
.card {
    position: absolute;
    top: 5px;
    left: 10px;
    width: 300px;
    height: 200px;
    background: var(--papel);
    z-index: 1;
    border: 2px solid var(--oro-puro);
    border-radius: 6px;
    transition: transform 0.8s ease, height 0.8s 0.3s ease;
    padding: 25px 15px;
    box-sizing: border-box;
    text-align: center;
    overflow: hidden;
}

/* marco interno elegante */
.card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(212,175,55,0.4);
    pointer-events: none;
}

.envelope-wrapper.open .flap {
    transform: rotateX(180deg);
    z-index: 0;
}

.envelope-wrapper.open .seal {
    opacity: 0;
}

.envelope-wrapper.open .card {
    transform: translateY(-280px);
    height: 560px;
    z-index: 10;
    box-shadow: 0 20px 80px rgba(0,0,0,0.8);
}

/* TEXTOS */
h1 {
    font-family: 'Cinzel Decorative', cursive;
    color: #aa8a2e;
    font-size: 1.2rem;
    margin: 0;
}

.subtitle {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #aa8a2e;
    margin-bottom: 5px;
}

.name {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    color: var(--turquesa-real);
    font-style: italic;
    margin: 5px 0;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(10,163,163,0.3);
}

.main-text {
    font-size: 0.85rem;
    line-height: 1.5;
    color: #333;
    margin: 10px 0;
}

.divider {
    width: 60%;
    height: 1px;
    background: var(--oro-puro);
    margin: 15px auto;
}

.dress-code {
    font-weight: bold;
    color: #aa8a2e;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 15px 0;
    font-size: 0.8rem;
}

/* BOTONES */
.btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: bold;
    border: 1px solid var(--oro-puro);
    background: linear-gradient(135deg, var(--turquesa-real), var(--turquesa-luz));
    transition: all 0.3s ease;
}

.btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, var(--turquesa-luz), var(--turquesa-real));
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="envelope-wrapper" onclick="this.classList.add('open')">

    <div class="card">
        <div class="subtitle">UNA NOCHE DE ENSUEÑO</div>
        <h1>Mis 15 Años</h1>

        <div class="name">Jazmin</div>

        <div class="main-text">
            "Hace 15 años iluminaste nuestras vidas, y hoy celebramos con orgullo la hermosa joven en la que te has convertido."
        </div>

        <div class="divider"></div>

        <div style="font-size: 0.9rem;">
            <strong>MARTES 18 DE AGOSTO - 21:00 HS</strong><br>
            Salón de Eventos Coopejas<br>
            J. Augusto Saldívar
        </div>

        <div class="dress-code">VESTIMENTA: SPORT ELEGANTE</div>

        <a href="https://wa.me/595982432818" class="btn">CONFIRMAR ASISTENCIA</a>
        <a href="https://maps.app.goo.gl/a9MzNJCMQNCpWhhXA" class="btn">VER UBICACIÓN</a>
    </div>

    <div class="envelope-front"></div>

    <div class="flap">
        <div class="seal">J</div>
    </div>

</div>

</body>
</html>
