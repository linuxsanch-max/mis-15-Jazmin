<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años - Una Noche Mágica</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --turquesa: #008080;
            --dorado: #D4AF37;
            --oscuro: #002b2b;
        }
        body {
            margin: 0;
            background-color: var(--oscuro);
            color: white;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        /* Efecto de destellos de fondo */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.5;
        }
        .container {
            z-index: 10;
            border: 2px solid var(--dorado);
            padding: 40px;
            background: rgba(0, 43, 43, 0.8);
            box-shadow: 0 0 20px var(--dorado);
            border-radius: 15px;
            max-width: 80%;
        }
        h1 {
            font-family: 'Cinzel Decorative', cursive;
            color: var(--dorado);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .boton {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            border: 1px solid var(--dorado);
            color: var(--dorado);
            text-decoration: none;
            transition: 0.3s;
            cursor: pointer;
        }
        .boton:hover {
            background: var(--dorado);
            color: var(--oscuro);
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <p>Bajo la luz de las estrellas...</p>
        <h1>Mis 15 Años</h1>
        <p>Te espero para vivir una noche mágica en el palacio.</p>
        <div class="boton" onclick="alert('¡Próximamente verás el libro abrirse!')">Abrir Invitación</div>
    </div>
</body>
</html>
